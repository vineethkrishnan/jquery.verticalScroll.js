<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Scroll Plugin - Test Page</title>
  <link rel="stylesheet" href="/src/css/jquery.verticalScroll.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #scroll-container {
      height: 100%;
      width: 100%;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    section h2 {
      font-size: 3rem;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
      margin: 0;
    }

    section p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 0.5rem;
    }

    #section-1 { background-color: #e74c3c; }
    #section-2 { background-color: #3498db; }
    #section-3 { background-color: #2ecc71; }
    #section-4 { background-color: #9b59b6; }
    #section-5 { background-color: #f39c12; }
  </style>
</head>
<body>
  <div id="scroll-container">
    <section id="section-1" data-vs-label="Home">
      <h2>Section 1</h2>
      <p>Home</p>
    </section>
    <section id="section-2" data-vs-label="About">
      <h2>Section 2</h2>
      <p>About</p>
    </section>
    <section id="section-3" data-vs-label="Services">
      <h2>Section 3</h2>
      <p>Services</p>
    </section>
    <section id="section-4" data-vs-label="Portfolio">
      <h2>Section 4</h2>
      <p>Portfolio</p>
    </section>
    <section id="section-5" data-vs-label="Contact">
      <h2>Section 5</h2>
      <p>Contact</p>
    </section>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/src/js/jquery.verticalScroll.js"></script>
  <script>
    $(function() {
      $('#scroll-container').verticalScroll({
        animationDuration: 300
      });
    });
  </script>
</body>
</html>
