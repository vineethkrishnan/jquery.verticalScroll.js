<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Vertical Scroll - Test Fixture</title>
    <link rel="stylesheet" href="../../src/css/jquery.verticalScroll.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }

        #scroll-container {
            height: 100vh;
            width: 100%;
        }

        .section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .section h2 {
            font-size: 2rem;
            color: #fff;
        }

        #section-1 { background-color: #e74c3c; }
        #section-2 { background-color: #3498db; }
        #section-3 { background-color: #2ecc71; }
        #section-4 { background-color: #9b59b6; }
        #section-5 { background-color: #f39c12; }
    </style>
</head>
<body>
    <div id="scroll-container">
        <section id="section-1" class="section" data-vs-label="Home">
            <h2>Section 1 - Home</h2>
        </section>
        <section id="section-2" class="section" data-vs-label="About">
            <h2>Section 2 - About</h2>
        </section>
        <section id="section-3" class="section" data-vs-label="Services">
            <h2>Section 3 - Services</h2>
        </section>
        <section id="section-4" class="section" data-vs-label="Portfolio">
            <h2>Section 4 - Portfolio</h2>
        </section>
        <section id="section-5" class="section" data-vs-label="Contact">
            <h2>Section 5 - Contact</h2>
        </section>
    </div>

    <script src="../../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../../src/js/jquery.verticalScroll.js"></script>
    <script>
        $(function() {
            var options = {};

            // Parse URL params for test configuration
            var params = new URLSearchParams(window.location.search);

            if (params.get('theme')) options.theme = params.get('theme');
            if (params.get('pagination') === 'false') options.pagination = false;
            if (params.get('loop') === 'true') options.loop = true;
            if (params.get('keyboard') === 'false') options.keyboard = false;
            if (params.get('mouseWheel') === 'false') options.mouseWheel = false;
            if (params.get('touch') === 'false') options.touch = false;
            if (params.get('autoScroll') === 'true') {
                options.autoScroll = true;
                options.autoScrollInterval = parseInt(params.get('autoScrollInterval') || '2000', 10);
            }
            if (params.get('paginationPosition')) options.paginationPosition = params.get('paginationPosition');
            if (params.get('animationDuration')) options.animationDuration = parseInt(params.get('animationDuration'), 10);

            $('#scroll-container').verticalScroll(options);
        });
    </script>
</body>
</html>
